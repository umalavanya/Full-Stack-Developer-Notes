                <pre>&lt;canvas id="c" width="400" height="300"&gt;&lt;/canvas&gt;
&lt;script&gt;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

ctx.fillStyle = 'red';
ctx.fillRect(10,10,150,100); // rectangle

ctx.beginPath();
ctx.arc(200,150,50,0,2*Math.PI);
ctx.fillStyle = 'green';
ctx.fill(); // circle

ctx.moveTo(0,0);
ctx.lineTo(400,300);
ctx.stroke(); // line

                {
                    id: "debouncing", title: "Debouncing", content: `
                <h2>Debouncing – limit execution frequency</h2>
                <p>Ensures function runs only after a pause. Useful for input events, resize.</p>
                <pre>function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}
window.addEventListener('resize', debounce(() => {
  console.log('resized (debounced)');
}, 300));</pre>
                <p>Delays execution until user stops triggering events.</p>
            `},

            const tocContainer = document.getElementById('tocList');
            const contentArea = document.getElementById('contentArea');

            function render() {
                let tocHtml = '';
                let contentHtml = '';

                sections.forEach((sec, idx) => {
                    const activeClass = idx === 0 ? 'active' : '';
                    tocHtml += `<li><button class="toc-btn ${activeClass}" data-id="${sec.id}">${sec.title}</button></li>`;

                    contentHtml += `<div id="card-${sec.id}" class="section-card ${idx === 0 ? 'active-card' : ''}">`;
                    contentHtml += `<div class="section-title">${sec.title}</div>`;
                    contentHtml += `<div class="tag">misc · ${sec.id}</div>`;
                    contentHtml += `<div class="notes-body">${sec.content}</div>`;
                    contentHtml += `</div>`;
                });

                tocContainer.innerHTML = tocHtml;
                contentArea.innerHTML = contentHtml;

                // attach click handlers
                document.querySelectorAll('.toc-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        document.querySelectorAll('.toc-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.section-card').forEach(c => c.classList.remove('active-card'));

                        btn.classList.add('active');
                        document.getElementById(`card-${id}`).classList.add('active-card');
                        contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                });
            }

            render();
        })();
    </script>
