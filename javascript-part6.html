                {
                    id: "events-intro", title: "Introduction to events", content: `
                <h2>Events & event handlers</h2>
                <p>Events are actions (click, load, keypress). Handlers can be HTML attributes (<code>onclick="func()"</code>) or <code>addEventListener</code>. Event object contains details.</p>
                <pre>&lt;button onclick="handleClick(event)"&gt;Click&lt;/button&gt;
&lt;script&gt;

&lt;/script&gt;</pre>
                <p>Event objects: <code>MouseEvent</code>, <code>KeyboardEvent</code>, <code>FocusEvent</code>, etc.</p>
            `},
                {
                    id: "dom-events", title: "DOM events", content: `
                <h2>DOM events</h2>

                <pre>element.onclick = function() { ... };
// or
element.addEventListener('click', handler);</pre>
            `},
                {
                    id: "addeventlistener", title: "addEventListener()", content: `
                <h2>addEventListener</h2>
                <p>Attach event handler without overriding existing ones. Syntax:</p>
                <pre>element.addEventListener(event, function, options);</pre>
                <p>Options: <code>capture</code>, <code>once</code>, <code>passive</code>. Remove with <code>removeEventListener</code>.</p>
                <pre>const btn = document.getElementById('btn');
btn.addEventListener('click', () => alert('clicked'));</pre>
            `},
                {
                    id: "mouse-events", title: "Mouse events", content: `

});</pre>

                {
                    id: "keyboard-events", title: "Keyboard events", content: `
                <h2>Keyboard events</h2>

                {
                    id: "form-events", title: "Form events", content: `
                <h2>Form events</h2>
                <p><code>submit</code>, <code>reset</code>, <code>change</code>, <code>input</code>, <code>focus</code>, <code>blur</code>.</p>
                <pre>form.addEventListener('submit', (e) => {
  e.preventDefault(); // stop submission
  // validate
});</pre>
                <p><code>onchange</code> fires after blur if value changed, <code>oninput</code> fires immediately.</p>
            `},
                {
                    id: "window-document-events", title: "Window/document events", content: `
                <h2>Window & document events</h2>
                <p><code>load</code>, <code>DOMContentLoaded</code>, <code>resize</code>, <code>scroll</code>, <code>unload</code>, <code>beforeunload</code>.</p>
                <pre>window.addEventListener('resize', () => {
  console.log(window.innerWidth);
});
document.addEventListener('DOMContentLoaded', () => {
  // DOM ready, images not yet loaded
});</pre>
            `},
                {
                    id: "event-delegation", title: "Event delegation", content: `
                <h2>Event delegation</h2>
                <p>Attach a single listener to a parent, use <code>event.target</code> to handle children. Useful for dynamic elements.</p>
                <pre>document.getElementById('list').addEventListener('click', (e) => {
  if (e.target.tagName === 'LI') {
    console.log('item clicked:', e.target.textContent);
  }
});</pre>
            `},
                {
                    id: "event-bubbling", title: "Event bubbling", content: `
                <h2>Event bubbling</h2>
                <p>Event propagates from target element up to ancestors. Default phase: bubbling. Stop with <code>event.stopPropagation()</code>.</p>
                <pre>parent.addEventListener('click', () => console.log('parent'));
child.addEventListener('click', () => console.log('child'));
// clicking child logs "child", then "parent"</pre>
            `},
                {
                    id: "event-capturing", title: "Event capturing", content: `
                <h2>Event capturing</h2>
                <p>Opposite direction: from root down to target. Enable by setting third param to <code>true</code> in addEventListener.</p>
                <pre>div.addEventListener('click', handler, true); // capturing</pre>
                <p>Useful for intercepting events before they reach target.</p>
            `},
                {
                    id: "custom-events", title: "Custom events", content: `
                <h2>Custom events</h2>
                <p>Create with <code>new Event()</code> or <code>new CustomEvent()</code> (adds <code>detail</code> property). Dispatch with <code>element.dispatchEvent(event)</code>.</p>
                <pre>const event = new CustomEvent('myEvent', { detail: { data: 42 } });
element.dispatchEvent(event);
element.addEventListener('myEvent', (e) => console.log(e.detail.data));</pre>
            `},
                {
                    id: "error-handling", title: "Errors & exceptions", content: `
                <h2>Error handling</h2>
                <p>Types: syntax, runtime (exceptions), logical. Handle with <code>try...catch...finally</code>, <code>throw</code>, <code>window.onerror</code>.</p>
                <pre>try {
  // risky code
  if (condition) throw new Error('custom');
} catch (err) {
  console.log(err.name, err.message);
} finally {
  // always runs
}</pre>
                <p>Error constructors: <code>Error</code>, <code>SyntaxError</code>, <code>ReferenceError</code>, <code>TypeError</code>, <code>RangeError</code>, <code>URIError</code>.</p>

                {
                    id: "try-catch", title: "try...catch", content: `

                <pre>try {
  nonExistentFunc();
} catch (err) {
  console.log(err.message);
} finally {
  console.log('cleanup');
}</pre>
                <p>Rethrow: <code>throw err;</code> inside catch.</p>
            `},
                {
                    id: "debugging", title: "Debugging", content: `

            `},
                {
                    id: "custom-errors", title: "Custom errors", content: `

  }

                {
                    id: "extending-errors", title: "Extending errors", content: `
                <h2>Extending Error</h2>

                <pre>class NotFoundError extends Error {

    this.name = 'NotFoundError';
    this.resource = resource;
  }

            `},
                {
                    id: "this-keyword", title: "this keyword", content: `
                <h2>'this' keyword</h2>
                <p>Value depends on invocation:</p>
                <ul><li>Global → <code>window</code> (or <code>undefined</code> in strict mode)</li>
                <li>Function (non‑strict) → <code>window</code></li>
                <li>Method → object</li>
                <li>Constructor → new instance</li>
                <li>Event handler → element</li>
                <li>Arrow function → parent scope (lexical)</li></ul>
                <pre>const obj = { name: 'Obj', show() { console.log(this.name); } };</pre>
                <p>Explicit binding: <code>call</code>, <code>apply</code>, <code>bind</code>.</p>
            `},
                {
                    id: "void-keyword", title: "void keyword", content: `
                <h2>void operator</h2>

            `},
                {
                    id: "new-keyword", title: "new keyword", content: `
                <h2>'new' operator</h2>

                {
                    id: "var-keyword", title: "var keyword", content: `

                {

                {
                    id: "dom-methods-properties", title: "DOM methods & properties", content: `
                <h2>DOM methods & properties</h2>

                <p>Properties: <code>innerHTML</code>, <code>textContent</code>, <code>classList</code>, <code>style</code>, <code>id</code>, <code>tagName</code>, <code>children</code>, <code>parentNode</code>, <code>firstChild</code>, <code>lastChild</code>.</p>
            `},
                {
                    id: "dom-document", title: "DOM Document", content: `
                <h2>Document object</h2>
                <p>Represents entire page. Properties: <code>title</code>, <code>URL</code>, <code>domain</code>, <code>cookie</code>, <code>forms</code>, <code>images</code>, <code>links</code>, <code>scripts</code>.</p>

                <pre>console.log(document.title);</pre>
            `},
                {
                    id: "dom-elements", title: "DOM Elements", content: `
                <h2>DOM Elements</h2>
                <p>Each HTML element is an <code>Element</code> node. Access via <code>document</code> methods. Modify content, attributes, styles.</p>
                <pre>const div = document.getElementById('myDiv');
div.textContent = 'New text';
div.setAttribute('data-custom', 'value');

            `},
                {
                    id: "dom-attr", title: "DOM Attribute (Attr)", content: `
                <h2>Attr interface</h2>
                <p>Represents an attribute of an element. Access via <code>element.attributes</code> (NamedNodeMap). Properties: <code>name</code>, <code>value</code>, <code>specified</code>.</p>

                <p><code>isId</code> property indicates if attribute is an ID.</p>

                {
                    id: "dom-forms", title: "DOM Forms", content: `
                <h2>DOM Forms</h2>
                <p>Access forms via <code>document.forms</code> (HTMLCollection). Get form elements with <code>form.elements</code>.</p>

                sections.forEach((sec, idx) => {
                    const activeClass = idx === 0 ? 'active' : '';
                    tocHtml += `<li><button class="toc-btn ${activeClass}" data-id="${sec.id}">${sec.title}</button></li>`;

                    contentHtml += `<div id="card-${sec.id}" class="section-card ${idx === 0 ? 'active-card' : ''}">`;
                    contentHtml += `<div class="section-title">${sec.title}</div>`;
                    contentHtml += `<div class="tag">topic · ${sec.id}</div>`;
                    contentHtml += `<div class="notes-body">${sec.content}</div>`;
                    contentHtml += `</div>`;
                });

                tocContainer.innerHTML = tocHtml;
                contentArea.innerHTML = contentHtml;

                // attach click handlers
                document.querySelectorAll('.toc-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = btn.dataset.id;
                        document.querySelectorAll('.toc-btn').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.section-card').forEach(c => c.classList.remove('active-card'));

                        btn.classList.add('active');
                        document.getElementById(`card-${id}`).classList.add('active-card');
                        contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    });
                });
            }

            render();
        })();
    </script>
</body>

</html>
